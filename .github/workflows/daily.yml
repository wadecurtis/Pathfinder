name: Pathfinder — Daily Digest

on:
  schedule:
    - cron: "7 14 * * *"   # 6am PST / 7am PDT Vancouver, daily
  workflow_dispatch:           # Manual trigger from GitHub anytime

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore seen-jobs cache
        uses: actions/cache/restore@v4
        with:
          path: pathfinder/data/tracker.db
          key: tracker-db-${{ github.run_id }}
          restore-keys: |
            tracker-db-

      - name: Apply config
        run: |
          if [ -n "$CONFIG" ]; then
            echo "$CONFIG" > config.yaml
          else
            cp config.example.yaml config.yaml
          fi
        env:
          CONFIG: ${{ secrets.CONFIG }}

      - name: Apply credentials
        run: |
          if [ -n "$KEYS" ]; then
            echo "$KEYS" > pathfinder/.env
          fi
        env:
          KEYS: ${{ secrets.KEYS }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r pathfinder/requirements.txt

      - name: Run scout
        run: python pathfinder.py

      - name: Save seen-jobs cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: pathfinder/data/tracker.db
          key: tracker-db-${{ github.run_id }}
