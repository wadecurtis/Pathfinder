# ═══════════════════════════════════════════════════════════════════════════════
# PATHFINDER — config.yaml
# One file. Edit this to make Pathfinder yours.
# ═══════════════════════════════════════════════════════════════════════════════
# ⚠️  This file contains your personal data.
# Do not push it to a public repo after filling it in.
# Add config.yaml to your .gitignore if you fork this publicly.


# ── YOUR PROFILE ──────────────────────────────────────────────────────────────
# The AI reads your profile when scoring each job posting.
# Be specific — actual metrics, real outcomes, technologies used.

profile:
  name: "Your Name"

  # One-line positioning — the AI leads with this when evaluating fit
  framing: "Salesforce practitioner moving into consulting"

  # The 6-8 facts the AI weighs every role against.
  # Write these as evidence, not job description. Specific outcomes beat vague claims.
  # Bad:  "Strong Salesforce experience"
  # Good: "Recovered a failed multi-partner implementation, ran $Xm revenue through the rebuilt org"
  highlights:
    - "5 years hands-on Salesforce experience (Sales Cloud, Agentforce)"
    - "Built and ran two production Sales Cloud orgs end-to-end"
    - "Recovered a failed multi-partner implementation, rebuilt from scratch"
    - "Ran 1,000+ deals and $Xm revenue through the org built — operator credibility most consultants lack"
    - "Built a working Agentforce agent from scratch (quote generation via plain language input)"
    - "Business Analysis coursework, distinction"
    - "Background is operator/practitioner (built and owned production orgs), not career-changer — this is depth, not a gap"

  certifications_held:
    - "Salesforce Admin"
    - "Agentforce Specialist"
    - "Agentblazer Legend"

  certifications_in_progress:
    - "Sales Cloud Consultant"

  languages:
    - "English"

  # Where you're willing to work
  location_prefs:
    base: "Your City, Province/State"
    hybrid_ok:
      - "Your City"
      - "Nearby City"
    open_to_remote: true


# ── SCORING CRITERIA ──────────────────────────────────────────────────────────
# What makes a role a YES, MAYBE, or NO.
#
# DECISION HIERARCHY:
#   1. Any disqualifier present = NO, no exceptions
#   2. No disqualifiers + 3 or more core/strong qualify signals = YES
#   3. No disqualifiers + partial qualify signals = MAYBE
#   Neutral signals reduce confidence but cannot block a YES.
#
# CONFIDENCE:
#   HIGH = unambiguous decision with strong direct evidence
#   MEDIUM = clear decision but some signals are soft or inferred
#   LOW = limited information or significant uncertainty in the posting

scoring:

  decision_framework:

    hierarchy:
      - disqualify_overrides_all
      - qualify_requires_majority_match
      - neutral_only_if_no_disqualifiers

    outputs:
      decision: ["YES", "MAYBE", "NO"]
      confidence: ["HIGH", "MEDIUM", "LOW"]

    rules:
      - "If ANY disqualifier is clearly present → decision = NO"
      - "If NO disqualifiers AND 3+ qualify signals → decision = YES"
      - "If NO disqualifiers AND partial qualify signals → decision = MAYBE"
      - "Neutral signals can lower confidence but cannot override a YES"
      - "Unclear or missing information defaults to MAYBE, not YES"


  qualify_signals:

    core:
      - "Your primary platform is the primary platform in the role"
      - "Role includes discovery, requirements gathering, or solution design"
      - "Client-facing responsibility (not internal admin)"
      - "End-to-end delivery exposure (discovery through go-live)"

    strong:
      - "Target client size matches your sweet spot"
      - "Ownership of solution design or architecture decisions"
      - "Focus on adoption, change management, or business outcomes"
      - "Your core technical skills are explicitly required"
      - "Emerging technology you have experience with is mentioned"

    supporting:
      - "Remote-friendly or flexible work structure"
      - "Partner or ISV environment"
      - "Cross-functional collaboration (sales, ops, stakeholders)"


  neutral_signals:

    acceptable_tradeoffs:
      - "Larger client base than your target (more complexity, slower cycles)"
      - "Adjacent platforms where your background transfers"
      - "Pre-sales or solutions engineering (less build, more demo)"
      - "Large global systems integrator environment (process-heavy, lower ownership)"

    interpretation_rule:
      - "Neutral signals reduce confidence but do not block a YES"
      - "Multiple neutral signals without strong qualify signals → MAYBE"


  disqualify_signals:

    hard:
      - "Requires technical skills outside your stack as a core responsibility"
      - "Requires a language you do not speak"
      - "Requires work authorization you do not hold"
      - "Salary explicitly below your floor"
      - "Role is junior admin or support (ticketing, data cleanup)"

    experience_mismatch:
      - "Requires years of experience in a context you do not have"
      - "Requires certifications not held as mandatory"

    domain_lockout:
      - "Requires deep domain expertise in an industry you cannot credibly claim"


  evidence_requirements:

    must_extract:
      - "1-2 direct quotes from the job description supporting the decision"
      - "Explicit mention of any disqualifier triggered"
      - "Explicit mention of strongest qualifying signal"

    rules:
      - "If no evidence is found, downgrade confidence"
      - "Do not infer requirements that are not stated"


  output_format:

    required_fields:
      - decision
      - confidence
      - reasoning_summary
      - top_qualifier
      - disqualifier_triggered
      - evidence_quotes

    constraints:
      - "reasoning_summary must be under 40 words"
      - "evidence_quotes must be verbatim text"


# ── SEARCH SETTINGS ───────────────────────────────────────────────────────────
# What to search for, where, and how aggressively.

search:
  queries:
    - "Salesforce Consultant"
    - "Salesforce Implementation Consultant"
    - "Salesforce Solutions Consultant"
    - "Salesforce Functional Consultant"
    - "CRM Consultant"
    - "Salesforce Solutions Engineer"
    - "Salesforce Pre-Sales"
    - "Salesforce Technical Consultant"

  locations:
    - "Canada"

  sources:
    - linkedin        # working reliably
    # - indeed        # scraping unreliable, left for future use
    # - glassdoor     # scraping unreliable, left for future use

  hours_old: 336       # 2-week lookback
  max_per_query: 20
  remote_only: false
  ai_filter: true

  target_roles: >
    Solutions Consultant, Implementation Consultant, Solutions Engineer,
    or Pre-Sales Consultant roles at Salesforce consulting partners or ISVs.
    Must involve Salesforce platform work — implementations, discovery,
    or pre-sales technical demos. Not internal admin roles, not pure
    sales quota roles, not staffing firms.

  title_keywords:
    - "salesforce"
    - "sales force"
    - "solutions consultant"
    - "implementation consultant"
    - "solutions engineer"
    - "pre-sales"
    - "presales"
    - "crm consultant"
    - "functional consultant"

  title_exclude:
    - "account executive"
    - "account manager"
    - "sdr"
    - "bdr"
    - "recruiter"
    - "marketing manager"
    - "retail"
    - "food"
    - "healthcare"
    - "civil engineer"
    - "mechanical engineer"
    - "electrical engineer"
    - "warehouse"
    - "driver"
    - "nurse"


# ── SYSTEM ────────────────────────────────────────────────────────────────────
# Rarely needs changing.

llm:
  provider: groq
  groq_model: llama-3.3-70b-versatile
  max_tokens: 4096
