name: Pathfinder — Daily Digest

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: full run or test (2 queries, 5 results, sends email)'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - test

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore seen-jobs cache
        uses: actions/cache/restore@v4
        with:
          path: pathfinder/data/tracker.db
          key: tracker-db-${{ github.run_id }}
          restore-keys: |
            tracker-db-

      - name: Apply config
        run: |
          if [ -n "$CONFIG" ]; then
            echo "$CONFIG" > config.yaml
          fi
        env:
          CONFIG: ${{ secrets.CONFIG }}

      - name: Apply credentials
        run: |
          if [ -n "$KEYS" ]; then
            echo "$KEYS" > pathfinder/.env
          fi
        env:
          KEYS: ${{ secrets.KEYS }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r pathfinder/requirements.txt

      - name: Run scout
        run: |
          if [ "${{ github.event.inputs.mode }}" = "test" ]; then
            python pathfinder.py --test
          else
            python pathfinder.py
          fi

      - name: Save seen-jobs cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: pathfinder/data/tracker.db
          key: tracker-db-${{ github.run_id }}
